
# Multi-node setup with MinIO for S3-compatible object storage
# Usage: docker compose -f docker-compose.cluster.yml up

services:
  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://clawbox:clawbox@db:5432/clawbox
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: clawbox-files
      AWS_REGION: us-east-1
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me-to-a-random-string}
      APP_URL: ${APP_URL:-http://localhost:8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: clawbox
      POSTGRES_PASSWORD: clawbox
      POSTGRES_DB: clawbox
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawbox"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"  # MinIO admin console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/clawbox-files --ignore-existing;
      exit 0;
      "

volumes:
  db_data:
  minio_data:
