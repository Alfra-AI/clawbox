<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawBox Drop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #e0e0e0;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px;
        }
        h1 { color: #00d4ff; font-size: 1.8rem; margin: 30px 0 8px; }
        .subtitle { color: #666; font-size: 0.95rem; margin-bottom: 30px; }
        .card {
            background: rgba(255,255,255,0.05); border-radius: 16px; padding: 28px;
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 480px;
            margin-bottom: 16px;
        }
        .tabs {
            display: flex; gap: 0; margin-bottom: 24px; border-radius: 8px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tab {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            background: rgba(255,255,255,0.03); font-weight: 500; font-size: 0.95rem;
            transition: background 0.2s;
        }
        .tab.active { background: rgba(0,212,255,0.15); color: #00d4ff; }
        .tab:hover:not(.active) { background: rgba(255,255,255,0.07); }

        /* Send view */
        .text-area {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 14px; color: #fff; font-size: 0.95rem;
            resize: vertical; min-height: 80px; font-family: inherit; margin-bottom: 12px;
        }
        .text-area:focus { outline: none; border-color: #00d4ff; }
        .text-area::placeholder { color: #555; }
        .upload-zone {
            border: 2px dashed rgba(0,212,255,0.25); border-radius: 10px; padding: 24px;
            text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
            margin-bottom: 12px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #00d4ff; background: rgba(0,212,255,0.05);
        }
        .upload-zone p { color: #666; font-size: 0.9rem; }
        .file-list-preview { margin-bottom: 12px; }
        .file-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0,212,255,0.1); border-radius: 20px;
            padding: 6px 12px; font-size: 0.8rem; margin: 3px;
        }
        .file-chip .remove { cursor: pointer; color: #888; font-size: 1rem; }
        .file-chip .remove:hover { color: #ef4444; }
        button {
            width: 100%; padding: 14px; border-radius: 8px; border: none; cursor: pointer;
            font-size: 1.05rem; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-1px); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc); color: #fff;
        }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(0,212,255,0.3); }
        .btn-secondary {
            background: rgba(255,255,255,0.1); color: #e0e0e0; margin-top: 8px;
        }

        /* Result view */
        .code-display {
            font-size: 4rem; font-weight: 800; color: #4ade80; letter-spacing: 0.4em;
            text-align: center; font-family: 'Monaco','Menlo',monospace; margin: 16px 0;
            text-indent: 0.4em;
        }
        .expires { color: #666; font-size: 0.85rem; text-align: center; }
        .countdown { color: #f59e0b; font-weight: 600; }

        /* Receive view */
        .code-input {
            display: flex; justify-content: center; gap: 10px; margin: 16px 0;
        }
        .code-input input {
            width: 52px; height: 64px; text-align: center; font-size: 1.8rem;
            font-weight: 700; background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; color: #fff;
            font-family: 'Monaco','Menlo',monospace;
        }
        .code-input input:focus { outline: none; border-color: #00d4ff; }

        /* Received content */
        .received-text {
            background: rgba(0,0,0,0.3); border-radius: 8px; padding: 16px;
            margin-bottom: 12px; white-space: pre-wrap; word-break: break-word;
            font-size: 0.95rem; color: #4ade80; max-height: 200px; overflow-y: auto;
        }
        .received-file {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px;
            margin-bottom: 8px;
        }
        .received-file .name { font-weight: 500; word-break: break-all; }
        .received-file .size { color: #888; font-size: 0.8rem; }
        .received-file button { width: auto; padding: 8px 16px; font-size: 0.85rem; }
        .status-msg { text-align: center; color: #888; padding: 20px; }
        .success-icon { font-size: 2rem; text-align: center; margin-bottom: 8px; }

        .hidden { display: none !important; }

        .notification {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 8px; color: #fff; font-weight: 500;
            z-index: 1000; font-size: 0.9rem;
        }
        .notification.success { background: #22c55e; }
        .notification.error { background: #ef4444; }

        .size-hint { color: #555; font-size: 0.8rem; margin-top: 4px; text-align: right; }

        @media (max-width: 500px) {
            body { padding: 12px; }
            .card { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .code-display { font-size: 3rem; }
            .code-input input { width: 46px; height: 56px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <h1>ClawBox Drop</h1>
    <p class="subtitle">Share text & files instantly. No sign-up needed.</p>

    <div class="card">
        <div class="tabs">
            <div class="tab active" id="tabSend" onclick="switchTab('send')">Send</div>
            <div class="tab" id="tabReceive" onclick="switchTab('receive')">Receive</div>
        </div>

        <!-- SEND VIEW -->
        <div id="sendView">
            <textarea class="text-area" id="dropText" placeholder="Paste text to share..." rows="3"></textarea>
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('dropFileInput').click()">
                <p>Tap to add files or drag & drop</p>
            </div>
            <input type="file" id="dropFileInput" multiple style="display:none" onchange="addFiles(this.files)">
            <div class="file-list-preview" id="filePreview"></div>
            <div class="size-hint" id="sizeHint"></div>
            <button class="btn-primary" id="shareBtn" onclick="createDrop()">Share</button>
        </div>

        <!-- RESULT VIEW (after share) -->
        <div id="resultView" class="hidden">
            <div class="success-icon">&#10003;</div>
            <p style="text-align:center;color:#888;margin-bottom:4px;">Your code:</p>
            <div class="code-display" id="resultCode"></div>
            <p class="expires">Expires in <span class="countdown" id="countdown"></span></p>
            <button class="btn-secondary" onclick="copyCode()">Copy Code</button>
            <button class="btn-secondary" onclick="resetSend()">New Drop</button>
        </div>

        <!-- RECEIVE VIEW -->
        <div id="receiveView" class="hidden">
            <p style="text-align:center;color:#888;margin-bottom:8px;">Enter the 4-digit code</p>
            <div class="code-input" id="codeInputs">
                <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus>
                <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]">
            </div>
            <div id="receiveContent" class="hidden"></div>
            <div id="receiveStatus" class="status-msg">Enter the code to receive</div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let pendingFiles = [];
        let dropCode = '';
        let countdownInterval = null;

        // --- Tab switching ---
        function switchTab(tab) {
            document.getElementById('tabSend').classList.toggle('active', tab === 'send');
            document.getElementById('tabReceive').classList.toggle('active', tab === 'receive');
            document.getElementById('sendView').classList.toggle('hidden', tab !== 'send');
            document.getElementById('resultView').classList.add('hidden');
            document.getElementById('receiveView').classList.toggle('hidden', tab !== 'receive');
            if (tab === 'receive') {
                const inputs = document.querySelectorAll('#codeInputs input');
                inputs.forEach(i => i.value = '');
                inputs[0].focus();
                document.getElementById('receiveContent').classList.add('hidden');
                document.getElementById('receiveStatus').textContent = 'Enter the code to receive';
                document.getElementById('receiveStatus').classList.remove('hidden');
            }
        }

        // --- Send: file management ---
        function addFiles(fileList) {
            for (const f of fileList) pendingFiles.push(f);
            renderFilePreview();
        }

        function removeFile(idx) {
            pendingFiles.splice(idx, 1);
            renderFilePreview();
        }

        function renderFilePreview() {
            const el = document.getElementById('filePreview');
            if (!pendingFiles.length) { el.innerHTML = ''; document.getElementById('sizeHint').textContent = ''; return; }
            el.innerHTML = pendingFiles.map((f, i) =>
                `<span class="file-chip">${f.name} (${formatBytes(f.size)})<span class="remove" onclick="removeFile(${i})">&times;</span></span>`
            ).join('');
            const total = pendingFiles.reduce((s, f) => s + f.size, 0);
            document.getElementById('sizeHint').textContent = `${formatBytes(total)} / 10 MB`;
        }

        // Drag and drop
        const dropZone = document.getElementById('dropZone');
        ['dragenter','dragover','dragleave','drop'].forEach(e => {
            dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); });
        });
        ['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('dragover')));
        ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('dragover')));
        dropZone.addEventListener('drop', e => addFiles(e.dataTransfer.files));

        // --- Send: create drop ---
        async function createDrop() {
            const text = document.getElementById('dropText').value.trim();
            if (!text && !pendingFiles.length) { notify('Add text or files to share', 'error'); return; }

            const btn = document.getElementById('shareBtn');
            btn.disabled = true; btn.textContent = 'Sharing...';

            const formData = new FormData();
            if (text) formData.append('text', text);
            for (const f of pendingFiles) formData.append('files', f);

            try {
                const res = await fetch(`${API}/drop`, { method: 'POST', body: formData });
                if (!res.ok) {
                    const err = await res.json();
                    notify(err.detail || 'Share failed', 'error');
                    btn.disabled = false; btn.textContent = 'Share';
                    return;
                }
                const data = await res.json();
                dropCode = data.code;

                // Show result
                document.getElementById('sendView').classList.add('hidden');
                document.getElementById('resultView').classList.remove('hidden');
                document.getElementById('resultCode').textContent = data.code;
                startCountdown(new Date(data.expires_at + 'Z'));
            } catch (err) {
                notify('Share failed', 'error');
                btn.disabled = false; btn.textContent = 'Share';
            }
        }

        function copyCode() {
            navigator.clipboard.writeText(dropCode);
            notify('Code copied!', 'success');
        }

        function resetSend() {
            pendingFiles = [];
            document.getElementById('dropText').value = '';
            renderFilePreview();
            document.getElementById('resultView').classList.add('hidden');
            document.getElementById('sendView').classList.remove('hidden');
            document.getElementById('shareBtn').disabled = false;
            document.getElementById('shareBtn').textContent = 'Share';
            if (countdownInterval) clearInterval(countdownInterval);
        }

        function startCountdown(expiresAt) {
            const el = document.getElementById('countdown');
            function update() {
                const left = Math.max(0, Math.floor((expiresAt - new Date()) / 1000));
                const m = Math.floor(left / 60);
                const s = left % 60;
                el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
                if (left <= 0) { clearInterval(countdownInterval); el.textContent = 'expired'; }
            }
            update();
            countdownInterval = setInterval(update, 1000);
        }

        // --- Receive: code input ---
        const codeInputs = document.querySelectorAll('#codeInputs input');
        codeInputs.forEach((input, idx) => {
            input.addEventListener('input', e => {
                const v = e.target.value.replace(/\D/g, '');
                e.target.value = v;
                if (v && idx < 3) codeInputs[idx + 1].focus();
                checkCode();
            });
            input.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0) {
                    codeInputs[idx - 1].focus();
                }
            });
            input.addEventListener('paste', e => {
                e.preventDefault();
                const paste = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 4);
                paste.split('').forEach((ch, i) => { if (codeInputs[i]) codeInputs[i].value = ch; });
                if (paste.length === 4) checkCode();
                else if (paste.length > 0) codeInputs[Math.min(paste.length, 3)].focus();
            });
        });

        async function checkCode() {
            const code = Array.from(codeInputs).map(i => i.value).join('');
            if (code.length !== 4) return;

            const statusEl = document.getElementById('receiveStatus');
            const contentEl = document.getElementById('receiveContent');
            statusEl.textContent = 'Loading...';
            statusEl.classList.remove('hidden');
            contentEl.classList.add('hidden');

            try {
                const res = await fetch(`${API}/drop/${code}`);
                if (!res.ok) {
                    const err = await res.json();
                    statusEl.textContent = err.detail || 'Drop not found';
                    return;
                }
                const data = await res.json();
                statusEl.classList.add('hidden');
                contentEl.classList.remove('hidden');

                let html = '';

                // Text — auto-copy to clipboard
                if (data.text) {
                    html += `<div class="received-text">${escapeHtml(data.text)}</div>`;
                    html += `<button class="btn-secondary" onclick="copyText()" style="margin-bottom:12px;">Copy Text</button>`;
                    try {
                        await navigator.clipboard.writeText(data.text);
                        notify('Text copied to clipboard!', 'success');
                    } catch (e) {}
                }

                // Files
                if (data.files && data.files.length) {
                    for (const f of data.files) {
                        html += `
                            <div class="received-file">
                                <div>
                                    <div class="name">${escapeHtml(f.filename)}</div>
                                    <div class="size">${formatBytes(f.size_bytes)}</div>
                                </div>
                                <button class="btn-primary" style="width:auto;padding:8px 16px;font-size:0.85rem;" onclick="downloadFile('${code}','${f.id}','${escapeHtml(f.filename)}')">Download</button>
                            </div>`;
                    }
                    // Auto-download if single file
                    if (data.files.length === 1) {
                        downloadFile(code, data.files[0].id, data.files[0].filename);
                    }
                }

                contentEl.innerHTML = html;
            } catch (err) {
                statusEl.textContent = 'Connection error';
            }
        }

        let receivedText = '';
        async function copyText() {
            const textEl = document.querySelector('.received-text');
            if (textEl) {
                await navigator.clipboard.writeText(textEl.textContent);
                notify('Text copied!', 'success');
            }
        }

        function downloadFile(code, fileId, filename) {
            const a = document.createElement('a');
            a.href = `${API}/drop/${code}/file/${fileId}`;
            a.download = filename;
            a.click();
        }

        // --- Utilities ---
        function formatBytes(b) {
            if (b === 0) return '0 B';
            const k = 1024, s = ['B','KB','MB','GB'];
            const i = Math.floor(Math.log(b) / Math.log(k));
            return parseFloat((b / Math.pow(k, i)).toFixed(1)) + ' ' + s[i];
        }

        function escapeHtml(t) {
            return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function notify(msg, type) {
            const d = document.createElement('div');
            d.className = `notification ${type}`;
            d.textContent = msg;
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 3000);
        }

        // Check URL for code (e.g., /drop?code=1234 or /drop#1234)
        const urlCode = new URLSearchParams(window.location.search).get('code');
        if (urlCode && urlCode.length === 4) {
            switchTab('receive');
            urlCode.split('').forEach((ch, i) => { if (codeInputs[i]) codeInputs[i].value = ch; });
            setTimeout(checkCode, 100);
        }
    </script>
</body>
</html>
